##Script used in conjunction with config/automations/weather_alerts.yaml and config/sensor/weather.yaml

nws_popup_on_wx_alert:
    alias: NWS Weather Alert Pop Up
    sequence:
        ## Dismiss any current alert so the UI isn't filled
        ## up with these if there are more then one.
        ## Only show the latest alert
      - service: persistent_notification.dismiss
        data:
          notification_id: "nwswxalert"
        ## Create a new persistent notification in the UI for a new alert
      - condition: template
        value_template: "{{ states('sensor.nws_alert_event') != 'None' }}"
      - service: persistent_notification.create
        data:
          notification_id: "nwswxalert"
          message: "{{ state_attr('sensor.nws_alert_event', 'features')[0].properties.description }}"
          title: "{{ states('sensor.nws_alert_event') }}"
