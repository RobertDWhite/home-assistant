- alias: Garbage Collection Reminder
  trigger:
    - platform: time
      at: "21:00:00"
  condition:
    condition: time
    weekday:
      - mon
  action:
    - service: script.sonos_say
      data:
        sonos_entity: media_player.living_room_speaker
        volume: 0.6
        message: "Good evening. Did you remember to take the trash out to the road? Don't forget to take the trash out to the road before you go to bed this evening. Have a great night."
    - delay: "00:00:10"
    - service: script.sonos_say
      data:
        sonos_entity: media_player.office_sonos
        volume: 0.6
        message: "Good evening. Did you remember to take the trash out to the road? Don't forget to take the trash out to the road before you go to bed this evening. Have a great night."
