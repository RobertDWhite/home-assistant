#Get weather alerts from NWS and supply TTS devices with information to verbally alert


- alias: 'NWS Weather Alert Pop Up Control'
  trigger:
    platform: state
    entity_id: sensor.nws_alert_count
  action:
    service: script.nws_popup_on_wx_alert


- alias: NWS Announcement Weather Alert
  mode: queued
  trigger:
    - platform: state
      entity_id: sensor.nws_alert_count
  condition:
    condition: and
    conditions:
      - condition: template
        value_template: '{{ states("sensor.nws_alert_count") | int > 0 }}'
        ## Added a time condition because I don't want a non-emergency alert waking me up
      - condition: or
        conditions:
          - condition: time
            after: '09:00:00'
            before: '23:00:00'
          - condition: template
            value_template: >
              {{ 'Warning' in states('sensor.nws_alert_event') }}
  variables:
    alert_message: >
      Attention!. . . Attention!. . . The National Weather Service has issued a
      {{ states('sensor.nws_alert_event') }} for Butler County. It expires at
      {{ as_timestamp(state_attr('sensor.nws_alert_event', 'features')[0].properties.expires)
         | timestamp_custom('%-I:%M %p on %-m-%-d-%Y') }}.
  action:
    - service: media_player.volume_set
      data:
        entity_id:
          - media_player.living_room_speaker
          - media_player.office_sonos
          - media_player.sonos
          - media_player.upstairs
          - media_player.family_room
        volume_level: 0.99
    - service: tts.google_translate_say
      data:
        entity_id: media_player.living_room_speaker
        message: "{{ alert_message }}"
    - service: script.sonos_say
      data:
        sonos_entity: media_player.office_sonos
        volume: 0.99
        message: "{{ alert_message }}"
    - delay: '00:00:10'
    - service: tts.google_translate_say
      data:
        entity_id: media_player.sonos
        message: "{{ alert_message }}"
    - delay: '00:00:10'
    - service: tts.google_translate_say
      data:
        entity_id: media_player.upstairs
        message: "{{ alert_message }}"
    - delay: '00:00:10'
    - service: tts.google_translate_say
      data:
        entity_id: media_player.family_room
        message: "{{ alert_message }}"
