#Get weather alerts from NWS and supply TTS devices with information to verbally alert


- alias: 'NWS Weather Alert Pop Up Control'
  trigger:
    platform: state
    entity_id: sensor.nws_alert_count
  action:
    - action: script.nws_popup_on_wx_alert


- alias: NWS Announcement Weather Alert
  mode: queued
  trigger:
    - platform: state
      entity_id: sensor.nws_alert_count
  condition:
    condition: and
    conditions:
      - condition: template
        value_template: '{{ states("sensor.nws_alert_count") | int > 0 }}'
        ## Quiet hours 9pm–8:30am: only Tornado Warnings are allowed to announce
      - condition: or
        conditions:
          - condition: time
            after: '08:30:00'
            before: '21:00:00'
          - condition: template
            value_template: >
              {{ 'Tornado Warning' in states('sensor.nws_alert_event') }}
  variables:
    alert_message: >
      Attention!. . . Attention!. . . The National Weather Service has issued a
      {{ states('sensor.nws_alert_event') }} for Butler County. It expires at
      {{ as_timestamp(state_attr('sensor.nws_alert_event', 'features')[0].properties.expires)
         | timestamp_custom('%-I:%M %p on %-m-%-d-%Y') }}.
  action:
    # Sonos speakers - snapshot/restore via sonos_say script
    - action: script.sonos_say
      data:
        sonos_entity: media_player.family_room
        volume: 0.50
        delay: '00:00:10'
        message: "{{ alert_message }}"
    - action: script.sonos_say
      data:
        sonos_entity: media_player.dining_room
        volume: 0.50
        delay: '00:00:10'
        message: "{{ alert_message }}"
    - action: script.sonos_say
      data:
        sonos_entity: media_player.unnamed_room
        volume: 0.50
        delay: '00:00:10'
        message: "{{ alert_message }}"
    - action: script.sonos_say
      data:
        sonos_entity: media_player.unnamed_room_2
        volume: 0.50
        delay: '00:00:10'
        message: "{{ alert_message }}"
    # HomePod Minis - Google TTS
    - action: media_player.volume_set
      data:
        entity_id:
          - media_player.kitchen
          - media_player.play_room
        volume_level: 0.50
    - action: tts.google_translate_say
      data:
        entity_id: media_player.kitchen
        message: "{{ alert_message }}"
    - delay: '00:00:10'
    - action: tts.google_translate_say
      data:
        entity_id: media_player.play_room
        message: "{{ alert_message }}"
    # WiiM speakers - Google TTS via DLNA
    - action: media_player.volume_set
      data:
        entity_id:
          - media_player.garage
          - media_player.gym
        volume_level: 0.50
    - action: media_player.volume_set
      data:
        entity_id: media_player.backyard
        volume_level: 0.99
    - action: tts.google_translate_say
      data:
        entity_id: media_player.garage
        message: "{{ alert_message }}"
    - delay: '00:00:10'
    - action: tts.google_translate_say
      data:
        entity_id: media_player.backyard
        message: "{{ alert_message }}"
    - delay: '00:00:10'
    - action: tts.google_translate_say
      data:
        entity_id: media_player.gym
        message: "{{ alert_message }}"
    # Denon AVR - Theatre
    - delay: '00:00:10'
    - action: media_player.volume_set
      data:
        entity_id: media_player.denon_avr_x4700h
        volume_level: 0.50
    - action: tts.google_translate_say
      data:
        entity_id: media_player.denon_avr_x4700h
        message: "{{ alert_message }}"
